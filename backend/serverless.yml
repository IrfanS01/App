org: irresarac
service: MinAppBackend

provider:
  name: aws
  runtime: nodejs18.x
  region: eu-north-1

  # IAM Role Permissions
  iamRoleStatements:
    - Effect: Allow
      Action:
        - cognito-idp:AdminCreateUser
        - cognito-idp:AdminDeleteUser
        - cognito-idp:AdminGetUser
        - cognito-idp:AdminUpdateUserAttributes
        - cognito-idp:AdminInitiateAuth
        - cognito-idp:ListUsers
      Resource:
        - !Sub arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${CognitoUserPool}

    - Effect: Allow
      Action:
        - dynamodb:Query
        - dynamodb:Scan
        - dynamodb:PutItem
        - dynamodb:UpdateItem
        - dynamodb:DeleteItem
      Resource:
        - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/Users
        - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/Notifications
        - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/Reservations  # OVO JE DODANO ✅

  environment:
    COGNITO_USER_POOL_ID: ${env:COGNITO_USER_POOL_ID}
    COGNITO_CLIENT_ID: ${env:COGNITO_CLIENT_ID}
    USERS_TABLE: Users
    NOTIFICATIONS_TABLE: Notifications
    RESERVATIONS_TABLE: Reservations  # ISPRAVLJENO ✅

functions:
  register:
    handler: src/handlers/auth.register
    events:
      - http:
          path: auth/register
          method: post
          cors: true

  login:
    handler: src/handlers/auth.login
    events:
      - http:
          path: auth/login
          method: post
          cors: true

  getUsers:
    handler: src/handlers/users.getUsers
    events:
      - http:
          path: users
          method: get
          cors: true

  createNotification:
    handler: src/handlers/notifications.createNotification
    events:
      - http:
          path: notifications
          method: post
          cors: true

  getNotifications:
    handler: src/handlers/notifications.getNotifications
    events:
      - http:
          path: notifications
          method: get
          cors: true

  createReservation:
    handler: src/handlers/reservations.createReservation
    events:
      - http:
          path: reservations
          method: post
          cors: true

  getReservations:
    handler: src/handlers/reservations.getReservations
    events:
      - http:
          path: reservations
          method: get
          cors: true

resources:
  Resources:
    CognitoUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: MinAppUserPool
        UsernameAttributes:
          - email
        AutoVerifiedAttributes:
          - email

    CognitoUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: MinAppClient
        UserPoolId:
          Ref: CognitoUserPool
        GenerateSecret: false

    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: Users
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: email
            AttributeType: S
        KeySchema:
          - AttributeName: email
            KeyType: HASH

    ReservationsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: Reservations
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH

outputs:
  CognitoUserPoolId:
    Value: !Ref CognitoUserPool
    Export:
      Name: CognitoUserPoolId

plugins:
  - serverless-offline

